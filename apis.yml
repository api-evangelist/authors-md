aid: authors-md
name: AUTHORS.md
description: >-
  AUTHORS.md is a file format standard used in open-source and collaborative
  software projects to list the original creators, primary authors, and
  significant contributors of a project. Often required by open-source licenses
  such as GPL and Apache 2.0 to provide proper attribution, the AUTHORS.md file
  documents who wrote what portions of a codebase, their email addresses, and
  the scope of their contributions. Related standards include CONTRIBUTORS.md,
  All Contributors specification, and REUSE/SPDX contributor attribution
  frameworks.
type: Index
